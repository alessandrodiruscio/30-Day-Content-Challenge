<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>30-Day Content Challenge - Content Strategy</title>
    <style>
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: 'Inter', sans-serif;
      }
      .loader-logo-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 32px;
        font-family: 'Inter', sans-serif;
      }
      .logo-the {
        font-size: 16px;
        font-weight: 800;
        text-transform: uppercase;
        color: #000;
        margin-bottom: 4px;
      }
      .logo-escape {
        font-size: 52px;
        font-weight: 900;
        text-transform: uppercase;
        font-style: italic;
        line-height: 0.8;
        background: linear-gradient(135deg, #DB2777, #6D28D9);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 4px;
      }
      .logo-9to5 {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 72px;
        font-weight: 900;
        line-height: 0.8;
        background: linear-gradient(135deg, #DB2777, #6D28D9);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .logo-to {
        font-size: 24px;
        border-bottom: 4px solid #6D28D9;
        line-height: 1;
        margin-top: 10px;
        -webkit-text-fill-color: #6D28D9; /* Fallback for the underline area if needed */
      }
      .logo-club {
        font-size: 24px;
        font-weight: 800;
        text-transform: uppercase;
        color: #000;
        margin-top: 8px;
        letter-spacing: 0.1em;
      }
      .loader-text {
        font-weight: 500;
        font-size: 1rem;
        color: #666;
        animation: pulse 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="loader-logo-container">
          <div class="logo-escape">30-Day</div>
          <div class="logo-club">Content Challenge</div>
        </div>
        <div class="loader-text">Preparing your challenge...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
